name: E-commerce-microservice-discount

on:
  push:
    branches:
      - master

jobs:

  discount:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: Password@1
          POSTGRES_DB: DiscountDb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d DiscountDb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Show Running Containers
        run: docker ps

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore services/discount/Discount.API/Discount.API.csproj
      - run: dotnet build services/discount/Discount.API/Discount.API.csproj

      
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          REPOSITORY: discount-api
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY \
          -f services/discount/Discount.API/Dockerfile .

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY


        