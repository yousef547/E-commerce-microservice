name: E-commerce-microservice-ci

on:
  push:
    branches:
      - master

jobs:
  catalog:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Show Running Containers
        run: docker ps

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
         
      - run: dotnet restore services/catalog/Catalog.API/Catalog.API.csproj
      - run: dotnet build services/catalog/Catalog.API/Catalog.API.csproj

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          REPOSITORY: catalog-api
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY \
          -f services/catalog/Catalog.API/Dockerfile .

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY


        