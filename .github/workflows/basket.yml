name: E-commerce-microservice-basket

on:
  push:
    branches:
      - master
jobs:
  basket:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Show Running Containers
        run: docker ps

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore services/basket/Basket.API/Basket.API.csproj
      - run: dotnet build services/basket/Basket.API/Basket.API.csproj

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          REPOSITORY: basket-api
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY \
          -f services/basket/Basket.API/Dockerfile .

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$REPOSITORY

 